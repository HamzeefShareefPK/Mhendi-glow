<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" shape-rendering="geometricPrecision">
  <defs>
    <!-- Dark brown background -->
    <radialGradient id="bg" cx="44%" cy="38%" r="65%">
      <stop offset="0%"   stop-color="#3C1608"/>
      <stop offset="55%"  stop-color="#1F0A04"/>
      <stop offset="100%" stop-color="#0C0300"/>
    </radialGradient>

    <!-- Gold ring / border gradient -->
    <linearGradient id="ringGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFF3A0"/>
      <stop offset="18%"  stop-color="#F5CF38"/>
      <stop offset="50%"  stop-color="#D49A18"/>
      <stop offset="80%"  stop-color="#A06210"/>
      <stop offset="100%" stop-color="#6B3C00"/>
    </linearGradient>

    <!-- Gold for M letter — top-to-bottom shimmer -->
    <linearGradient id="mGold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#FFFAC8"/>
      <stop offset="12%"  stop-color="#FFE050"/>
      <stop offset="35%"  stop-color="#F0B820"/>
      <stop offset="62%"  stop-color="#C07C08"/>
      <stop offset="85%"  stop-color="#8A4E00"/>
      <stop offset="100%" stop-color="#5A2C00"/>
    </linearGradient>

    <!-- Green mehndi gradient -->
    <linearGradient id="grn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#D0E840"/>
      <stop offset="45%"  stop-color="#8EC020"/>
      <stop offset="100%" stop-color="#4E7808"/>
    </linearGradient>

    <!-- Drop shadow for M -->
    <filter id="mfx" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="5" stdDeviation="7" flood-color="#00000099"/>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <circle cx="256" cy="256" r="255" fill="url(#bg)"/>

  <!-- GOLD RINGS -->
  <circle cx="256" cy="256" r="246" fill="none" stroke="url(#ringGold)" stroke-width="11"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#ringGold)" stroke-width="3"/>

  <!-- TOP CENTER FLOWER -->
  <g transform="translate(256,84)" fill="url(#grn)">
    <circle r="7.5" fill="#C8E040"/>
    <ellipse cx="0" cy="-20" rx="7"  ry="15" transform="rotate(0)"/>
    <ellipse cx="0" cy="-20" rx="7"  ry="15" transform="rotate(45)"/>
    <ellipse cx="0" cy="-20" rx="7"  ry="15" transform="rotate(90)"/>
    <ellipse cx="0" cy="-20" rx="7"  ry="15" transform="rotate(135)"/>
    <ellipse cx="0" cy="-20" rx="7"  ry="15" transform="rotate(180)"/>
    <ellipse cx="0" cy="-20" rx="7"  ry="15" transform="rotate(225)"/>
    <ellipse cx="0" cy="-20" rx="7"  ry="15" transform="rotate(270)"/>
    <ellipse cx="0" cy="-20" rx="7"  ry="15" transform="rotate(315)"/>
    <circle cx="0"   cy="-46" r="3.5"/>
    <circle cx="32"  cy="-33" r="3"/>
    <circle cx="-32" cy="-33" r="3"/>
  </g>

  <!-- TOP-LEFT VINE & LEAVES -->
  <g fill="url(#grn)">
    <path fill="none" stroke="url(#grn)" stroke-width="2.5" stroke-linecap="round"
          d="M178,118 C162,135 148,155 134,178 C122,198 116,222 128,242"/>
    <path d="M168,134 C155,125 140,128 137,142 C148,146 160,144 168,134 Z"/>
    <path d="M148,162 C134,154 118,158 116,172 C128,176 140,172 148,162 Z"/>
    <path d="M108,230 C96,210 94,188 108,172 C120,185 122,210 108,230 Z"/>
    <path d="M108,230 C100,218 98,205 104,194 C112,202 116,216 108,230 Z" fill="#3A6008" opacity="0.5"/>
    <circle cx="160" cy="150" r="3.5"/>
    <circle cx="138" cy="178" r="3"/>
    <circle cx="124" cy="205" r="2.8"/>
    <circle cx="118" cy="245" r="2.5"/>
  </g>

  <!-- TOP-RIGHT VINE & LEAVES (mirror) -->
  <g fill="url(#grn)" transform="translate(512,0) scale(-1,1)">
    <path fill="none" stroke="url(#grn)" stroke-width="2.5" stroke-linecap="round"
          d="M178,118 C162,135 148,155 134,178 C122,198 116,222 128,242"/>
    <path d="M168,134 C155,125 140,128 137,142 C148,146 160,144 168,134 Z"/>
    <path d="M148,162 C134,154 118,158 116,172 C128,176 140,172 148,162 Z"/>
    <path d="M108,230 C96,210 94,188 108,172 C120,185 122,210 108,230 Z"/>
    <path d="M108,230 C100,218 98,205 104,194 C112,202 116,216 108,230 Z" fill="#3A6008" opacity="0.5"/>
    <circle cx="160" cy="150" r="3.5"/>
    <circle cx="138" cy="178" r="3"/>
    <circle cx="124" cy="205" r="2.8"/>
    <circle cx="118" cy="245" r="2.5"/>
  </g>

  <!-- LEFT LARGE LEAF CLUSTER -->
  <g fill="url(#grn)" transform="translate(86,240)">
    <path d="M0,0 C-14,-32 -16,-72 0,-100 C16,-72 14,-32 0,0 Z"/>
    <path d="M4,-55 C20,-68 38,-66 38,-80 C24,-72 10,-66 4,-55 Z"/>
    <path d="M4,-32 C18,-42 34,-40 36,-52 C22,-46 10,-40 4,-32 Z"/>
    <circle cx="0"  cy="-18" r="3.2"/>
    <circle cx="1"  cy="-42" r="2.8"/>
    <circle cx="1"  cy="-65" r="2.5"/>
    <path d="M-2,-80 C-14,-90 -20,-105 -12,-112 C-6,-104 -6,-90 -2,-80 Z"/>
  </g>

  <!-- RIGHT LARGE LEAF CLUSTER (mirror) -->
  <g fill="url(#grn)" transform="translate(426,240) scale(-1,1)">
    <path d="M0,0 C-14,-32 -16,-72 0,-100 C16,-72 14,-32 0,0 Z"/>
    <path d="M4,-55 C20,-68 38,-66 38,-80 C24,-72 10,-66 4,-55 Z"/>
    <path d="M4,-32 C18,-42 34,-40 36,-52 C22,-46 10,-40 4,-32 Z"/>
    <circle cx="0"  cy="-18" r="3.2"/>
    <circle cx="1"  cy="-42" r="2.8"/>
    <circle cx="1"  cy="-65" r="2.5"/>
    <path d="M-2,-80 C-14,-90 -20,-105 -12,-112 C-6,-104 -6,-90 -2,-80 Z"/>
  </g>

  <!-- BOTTOM LEFT FLORAL -->
  <g fill="url(#grn)" transform="translate(122,364)">
    <path d="M0,0 C-10,22 -8,50 6,58 C18,50 16,22 0,0 Z"/>
    <path d="M-2,22 C-18,20 -36,10 -42,24 C-30,30 -14,28 -2,22 Z"/>
    <path d="M5,15 C18,8 32,12 34,2 C22,4 12,8 5,15 Z"/>
    <circle cx="4"   cy="35"  r="3"/>
    <circle cx="-20" cy="26"  r="2.8"/>
    <circle cx="18"  cy="10"  r="2.5"/>
  </g>

  <!-- BOTTOM RIGHT FLORAL (mirror) -->
  <g fill="url(#grn)" transform="translate(390,364) scale(-1,1)">
    <path d="M0,0 C-10,22 -8,50 6,58 C18,50 16,22 0,0 Z"/>
    <path d="M-2,22 C-18,20 -36,10 -42,24 C-30,30 -14,28 -2,22 Z"/>
    <path d="M5,15 C18,8 32,12 34,2 C22,4 12,8 5,15 Z"/>
    <circle cx="4"   cy="35"  r="3"/>
    <circle cx="-20" cy="26"  r="2.8"/>
    <circle cx="18"  cy="10"  r="2.5"/>
  </g>

  <!-- BOTTOM CENTER FLOWER -->
  <g transform="translate(256,422)" fill="url(#grn)">
    <circle r="6" fill="#C8E040"/>
    <ellipse cx="0" cy="-16" rx="6"  ry="12" transform="rotate(0)"/>
    <ellipse cx="0" cy="-16" rx="6"  ry="12" transform="rotate(72)"/>
    <ellipse cx="0" cy="-16" rx="6"  ry="12" transform="rotate(144)"/>
    <ellipse cx="0" cy="-16" rx="6"  ry="12" transform="rotate(216)"/>
    <ellipse cx="0" cy="-16" rx="6"  ry="12" transform="rotate(288)"/>
    <circle cx="0"   cy="-32" r="3"/>
    <circle cx="30"  cy="-10" r="2.5"/>
    <circle cx="-30" cy="-10" r="2.5"/>
  </g>

  <!-- EXTRA SCATTERED DOTS -->
  <g fill="url(#grn)" opacity="0.85">
    <circle cx="150" cy="385" r="3.2"/>
    <circle cx="100" cy="340" r="2.8"/>
    <circle cx="362" cy="385" r="3.2"/>
    <circle cx="412" cy="340" r="2.8"/>
    <circle cx="84"  cy="286" r="2.5"/>
    <circle cx="428" cy="286" r="2.5"/>
  </g>

  <!-- CENTRAL GOLD M — shadow layer -->
  <text x="260" y="334"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman','Palatino Linotype',serif"
    font-size="272" font-style="italic" font-weight="bold"
    fill="#2A0E00" opacity="0.75">M</text>

  <!-- CENTRAL GOLD M — main layer -->
  <text x="256" y="330"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman','Palatino Linotype',serif"
    font-size="272" font-style="italic" font-weight="bold"
    fill="url(#mGold)"
    filter="url(#mfx)">M</text>

  <!-- CENTRAL GOLD M — highlight shimmer -->
  <text x="253" y="325"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman','Palatino Linotype',serif"
    font-size="272" font-style="italic" font-weight="bold"
    fill="#FFFBE8" opacity="0.07">M</text>
</svg>

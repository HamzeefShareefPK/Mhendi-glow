<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2E1206"/>
      <stop offset="100%" stop-color="#5A2A0A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F7DC8A"/>
      <stop offset="50%"  stop-color="#D4922A"/>
      <stop offset="100%" stop-color="#A05C10"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F0C050"/>
      <stop offset="100%" stop-color="#C87820"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.4"/>

  <!-- 8 outer petals -->
  <g fill="url(#gold)" opacity="0.75">
    <ellipse cx="32" cy="10" rx="2.8" ry="5.5"/>
    <ellipse cx="32" cy="10" rx="2.8" ry="5.5" transform="rotate(45 32 32)"/>
    <ellipse cx="32" cy="10" rx="2.8" ry="5.5" transform="rotate(90 32 32)"/>
    <ellipse cx="32" cy="10" rx="2.8" ry="5.5" transform="rotate(135 32 32)"/>
    <ellipse cx="32" cy="10" rx="2.8" ry="5.5" transform="rotate(180 32 32)"/>
    <ellipse cx="32" cy="10" rx="2.8" ry="5.5" transform="rotate(225 32 32)"/>
    <ellipse cx="32" cy="10" rx="2.8" ry="5.5" transform="rotate(270 32 32)"/>
    <ellipse cx="32" cy="10" rx="2.8" ry="5.5" transform="rotate(315 32 32)"/>
  </g>

  <!-- 8 inner petals -->
  <g fill="url(#gold2)" opacity="0.9">
    <ellipse cx="32" cy="17" rx="2.2" ry="4.5"/>
    <ellipse cx="32" cy="17" rx="2.2" ry="4.5" transform="rotate(45 32 32)"/>
    <ellipse cx="32" cy="17" rx="2.2" ry="4.5" transform="rotate(90 32 32)"/>
    <ellipse cx="32" cy="17" rx="2.2" ry="4.5" transform="rotate(135 32 32)"/>
    <ellipse cx="32" cy="17" rx="2.2" ry="4.5" transform="rotate(180 32 32)"/>
    <ellipse cx="32" cy="17" rx="2.2" ry="4.5" transform="rotate(225 32 32)"/>
    <ellipse cx="32" cy="17" rx="2.2" ry="4.5" transform="rotate(270 32 32)"/>
    <ellipse cx="32" cy="17" rx="2.2" ry="4.5" transform="rotate(315 32 32)"/>
  </g>

  <!-- 8 small dots between petals -->
  <g fill="url(#gold)" opacity="0.6">
    <circle cx="32" cy="13" r="1.2" transform="rotate(22.5 32 32)"/>
    <circle cx="32" cy="13" r="1.2" transform="rotate(67.5 32 32)"/>
    <circle cx="32" cy="13" r="1.2" transform="rotate(112.5 32 32)"/>
    <circle cx="32" cy="13" r="1.2" transform="rotate(157.5 32 32)"/>
    <circle cx="32" cy="13" r="1.2" transform="rotate(202.5 32 32)"/>
    <circle cx="32" cy="13" r="1.2" transform="rotate(247.5 32 32)"/>
    <circle cx="32" cy="13" r="1.2" transform="rotate(292.5 32 32)"/>
    <circle cx="32" cy="13" r="1.2" transform="rotate(337.5 32 32)"/>
  </g>

  <!-- Center ring -->
  <circle cx="32" cy="32" r="9"  fill="url(#gold)"  opacity="0.95"/>
  <circle cx="32" cy="32" r="7"  fill="#3A1508"/>
  <circle cx="32" cy="32" r="5"  fill="url(#gold2)" opacity="0.9"/>
  <circle cx="32" cy="32" r="3"  fill="#F7E0A0"/>
  <circle cx="32" cy="32" r="1.5" fill="url(#gold)"/>
</svg>

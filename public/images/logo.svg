<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5D38A"/>
      <stop offset="40%"  stop-color="#C8946A"/>
      <stop offset="100%" stop-color="#8B5E2A"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F0C060"/>
      <stop offset="60%"  stop-color="#C8822A"/>
      <stop offset="100%" stop-color="#7A4010"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ Icon: Mandala hands ══ -->
  <!-- Outer ring dots -->
  <g fill="url(#iconGrad)" opacity="0.7">
    <circle cx="50" cy="12" r="2"/>
    <circle cx="62" cy="15" r="1.5"/>
    <circle cx="38" cy="15" r="1.5"/>
    <circle cx="70" cy="22" r="1.5"/>
    <circle cx="30" cy="22" r="1.5"/>
    <circle cx="74" cy="32" r="1.5"/>
    <circle cx="26" cy="32" r="1.5"/>
  </g>

  <!-- Mandala petals outer -->
  <g fill="none" stroke="url(#iconGrad)" stroke-width="1.4" opacity="0.85">
    <ellipse cx="50" cy="20" rx="5" ry="10" transform="rotate(0 50 35)"/>
    <ellipse cx="50" cy="20" rx="5" ry="10" transform="rotate(45 50 35)"/>
    <ellipse cx="50" cy="20" rx="5" ry="10" transform="rotate(90 50 35)"/>
    <ellipse cx="50" cy="20" rx="5" ry="10" transform="rotate(135 50 35)"/>
    <ellipse cx="50" cy="20" rx="5" ry="10" transform="rotate(180 50 35)"/>
    <ellipse cx="50" cy="20" rx="5" ry="10" transform="rotate(225 50 35)"/>
    <ellipse cx="50" cy="20" rx="5" ry="10" transform="rotate(270 50 35)"/>
    <ellipse cx="50" cy="20" rx="5" ry="10" transform="rotate(315 50 35)"/>
  </g>

  <!-- Mandala petals inner -->
  <g fill="url(#iconGrad)" opacity="0.6">
    <ellipse cx="50" cy="26" rx="3" ry="6" transform="rotate(0 50 35)"/>
    <ellipse cx="50" cy="26" rx="3" ry="6" transform="rotate(45 50 35)"/>
    <ellipse cx="50" cy="26" rx="3" ry="6" transform="rotate(90 50 35)"/>
    <ellipse cx="50" cy="26" rx="3" ry="6" transform="rotate(135 50 35)"/>
    <ellipse cx="50" cy="26" rx="3" ry="6" transform="rotate(180 50 35)"/>
    <ellipse cx="50" cy="26" rx="3" ry="6" transform="rotate(225 50 35)"/>
    <ellipse cx="50" cy="26" rx="3" ry="6" transform="rotate(270 50 35)"/>
    <ellipse cx="50" cy="26" rx="3" ry="6" transform="rotate(315 50 35)"/>
  </g>

  <!-- Center flower -->
  <circle cx="50" cy="35" r="8" fill="url(#iconGrad)" opacity="0.9"/>
  <circle cx="50" cy="35" r="5" fill="url(#goldGrad)"/>
  <circle cx="50" cy="35" r="2.5" fill="#FDF0D8"/>

  <!-- Henna hands (simplified elegant curves) -->
  <!-- Left hand -->
  <path d="M32 62 C28 58 24 55 22 50 C20 45 21 40 24 38 C26 36 29 37 30 40 C31 38 33 37 35 39 C36 37 38 36 40 38 C41 36 43 36 44 39 L44 55 C42 60 38 64 34 66 Z"
        fill="url(#iconGrad)" opacity="0.88"/>
  <!-- Left hand mehndi detail lines -->
  <path d="M30 42 C30 46 31 50 32 54" fill="none" stroke="#FDF0D8" stroke-width="0.8" opacity="0.6"/>
  <path d="M35 40 C35 45 35 50 35 55" fill="none" stroke="#FDF0D8" stroke-width="0.8" opacity="0.6"/>
  <path d="M40 40 C40 45 40 50 40 55" fill="none" stroke="#FDF0D8" stroke-width="0.8" opacity="0.6"/>
  <path d="M26 48 C30 47 34 47 38 48" fill="none" stroke="#FDF0D8" stroke-width="0.8" opacity="0.5"/>

  <!-- Right hand -->
  <path d="M68 62 C72 58 76 55 78 50 C80 45 79 40 76 38 C74 36 71 37 70 40 C69 38 67 37 65 39 C64 37 62 36 60 38 C59 36 57 36 56 39 L56 55 C58 60 62 64 66 66 Z"
        fill="url(#iconGrad)" opacity="0.88"/>
  <!-- Right hand mehndi detail lines -->
  <path d="M70 42 C70 46 69 50 68 54" fill="none" stroke="#FDF0D8" stroke-width="0.8" opacity="0.6"/>
  <path d="M65 40 C65 45 65 50 65 55" fill="none" stroke="#FDF0D8" stroke-width="0.8" opacity="0.6"/>
  <path d="M60 40 C60 45 60 50 60 55" fill="none" stroke="#FDF0D8" stroke-width="0.8" opacity="0.6"/>
  <path d="M74 48 C70 47 66 47 62 48" fill="none" stroke="#FDF0D8" stroke-width="0.8" opacity="0.5"/>

  <!-- Wrist band lines -->
  <path d="M32 64 C38 67 43 68 50 68 C57 68 62 67 68 64" fill="none" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.7"/>
  <path d="M33 67 C39 70 44 71 50 71 C56 71 61 70 67 67" fill="none" stroke="url(#iconGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Bottom decorative dots -->
  <g fill="url(#iconGrad)" opacity="0.65">
    <circle cx="50" cy="76" r="2.2"/>
    <circle cx="43" cy="74" r="1.4"/>
    <circle cx="57" cy="74" r="1.4"/>
    <circle cx="37" cy="70" r="1.2"/>
    <circle cx="63" cy="70" r="1.2"/>
  </g>

  <!-- ══ Brand Text ══ -->
  <!-- "Mehndi" in elegant serif style -->
  <text x="112" y="46"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32"
        font-weight="700"
        font-style="italic"
        fill="url(#goldGrad)"
        filter="url(#glow)"
        letter-spacing="1">Mehndi</text>

  <!-- "DesignPics" normal weight -->
  <text x="250" y="46"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22"
        font-weight="400"
        fill="url(#goldGrad)"
        letter-spacing="0.5">DesignPics</text>

  <!-- ".com" small -->
  <text x="394" y="46"
        font-family="Arial, sans-serif"
        font-size="13"
        font-weight="600"
        fill="#C8946A"
        opacity="0.85">.com</text>

  <!-- Decorative line under text -->
  <line x1="112" y1="54" x2="435" y2="54" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.5"/>

  <!-- Tagline -->
  <text x="112" y="72"
        font-family="'Trebuchet MS', Arial, sans-serif"
        font-size="11"
        font-weight="500"
        fill="#C8946A"
        letter-spacing="3.5"
        opacity="0.9">— ART OF HENNA &amp; BEAUTY —</text>
</svg>
